name: Update Fork and Create Release

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update and release (e.g., 17.0, 18.0, 19.0)'
        required: true
        type: choice
        options:
          - '17.0'
          - '18.0'
          - '19.0'
      tag_description:
        description: 'Release tag description (used only in manual runs)'
        required: false
        type: string
        default: 'Manual release'
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.set-branches.outputs.branches }}
    steps:
      - id: set-branches
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "branches=[\"${{ github.event.inputs.branch }}\"]" >> $GITHUB_OUTPUT
          else
            echo "branches=[\"17.0\", \"18.0\", \"19.0\"]" >> $GITHUB_OUTPUT
          fi

  update-and-release:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Use matrix strategy to process all branches independently
    # This guarantees all branches are processed even if one fails
    strategy:
      matrix:
        branch: ${{ fromJSON(needs.prepare.outputs.branches) }}
      fail-fast: false  # Continue processing other branches even if one fails
      max-parallel: 3    # Process all branches in parallel
    
    steps:
      - name: Checkout repository (shallow clone)
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 1  # Only fetch the latest commit for the specific branch
          token: ${{ secrets.ODOO_GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "${{ secrets.ODOO_GITHUB_USER }}"
          git config user.email "${{ secrets.ODOO_GITHUB_USER }}@users.noreply.github.com"
          # Configure remote URL with token for authenticated pushes
          git remote set-url origin "https://${{ secrets.ODOO_GITHUB_USER }}:${{ secrets.ODOO_GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Add upstream remote and fetch specific branch
        run: |
          if ! git remote | grep -q upstream; then
            git remote add upstream https://github.com/odoo/odoo.git
          else
            git remote set-url upstream https://github.com/odoo/odoo.git
          fi
          # Only fetch the specific branch we need from upstream (shallow)
          git fetch upstream ${{ matrix.branch }} --depth=1

      - name: Update branch and create release
        env:
          GITHUB_TOKEN: ${{ secrets.ODOO_GITHUB_TOKEN }}
          BRANCH: ${{ matrix.branch }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_DESCRIPTION: ${{ github.event.inputs.tag_description }}
        run: |
          echo "Processing branch: $BRANCH"
          # Check if this is a manual workflow dispatch
          if [ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]; then
            IS_MANUAL="true"
          else
            IS_MANUAL="false"
          fi
          
          # We're already on the correct branch from checkout step
          # Ensure we're on the branch (should already be there)
          git checkout $BRANCH || {
            echo "Error: Could not checkout branch $BRANCH"
            exit 1
          }
          
          # Fetch latest from origin for the branch (shallow, just in case)
          git fetch origin $BRANCH --depth=1 2>/dev/null || true
          
          # Upstream branch was already fetched in previous step
          # Verify it exists
          if ! git rev-parse upstream/$BRANCH >/dev/null 2>&1; then
            echo "Error: Branch $BRANCH not found in upstream"
            exit 1
          fi
          
          # Check if there are updates
          UPSTREAM_COMMIT=$(git rev-parse upstream/$BRANCH 2>/dev/null || echo "")
          CURRENT_COMMIT=$(git rev-parse HEAD)
          
          if [ -z "$UPSTREAM_COMMIT" ]; then
            echo "Error: Branch $BRANCH not found in upstream"
            exit 1
          fi
          
          BRANCH_UPDATED=false
          
          if [ "$UPSTREAM_COMMIT" != "$CURRENT_COMMIT" ]; then
            echo "Updating branch $BRANCH from upstream..."
            
            # Try to merge upstream changes (works for fast-forward merges with shallow clone)
            if git merge upstream/$BRANCH --no-edit 2>&1; then
              # Push updated branch
              if git push origin $BRANCH; then
                BRANCH_UPDATED=true
                echo "Branch $BRANCH updated successfully"
              else
                echo "Error: Push failed for branch $BRANCH"
                exit 1
              fi
            else
              # Merge failed - could be due to shallow history or conflicts
              # Reset to upstream (doesn't require full history)
              echo "Merge failed, resetting to upstream..."
              git merge --abort 2>/dev/null || true
              git reset --hard upstream/$BRANCH
              if git push origin $BRANCH --force; then
                BRANCH_UPDATED=true
                echo "Branch $BRANCH reset to upstream and pushed"
              else
                echo "Error: Force push failed for branch $BRANCH"
                exit 1
              fi
            fi
          else
            echo "Branch $BRANCH is already up to date"
          fi
          
          # Create release
          if [ "$IS_MANUAL" == "true" ]; then
            # Manual run: always create release with format branch_release_tag
            TAG_DESC="$TAG_DESCRIPTION"
            # Use default if empty
            if [ -z "$TAG_DESC" ]; then
              TAG_DESC="Manual release"
            fi
            # Sanitize tag description: replace spaces and special chars with underscores, remove invalid chars
            SANITIZED_TAG=$(echo "$TAG_DESC" | sed 's/[^a-zA-Z0-9._-]/_/g' | sed 's/__*/_/g' | sed -E 's/^_|_$//g')
            # Ensure sanitized tag is not empty
            if [ -z "$SANITIZED_TAG" ]; then
              SANITIZED_TAG="manual_release"
            fi
            # Remove branch prefix if it's already in the tag description to avoid duplication
            if [[ "$SANITIZED_TAG" == "${BRANCH}_"* ]]; then
              SANITIZED_TAG="${SANITIZED_TAG#${BRANCH}_}"
            fi
            RELEASE_NAME="${BRANCH}_${SANITIZED_TAG}"
            RELEASE_TAG="${BRANCH}_${SANITIZED_TAG}"
            RELEASE_NOTES="Manual release for branch $BRANCH: $TAG_DESC"
          elif [ "$BRANCH_UPDATED" == "true" ]; then
            # Scheduled run: only create release if branch was updated, use date format
            DATE=$(date +%Y%m%d)
            RELEASE_NAME="${BRANCH}_${DATE}"
            RELEASE_TAG="${BRANCH}_${DATE}"
            RELEASE_NOTES="Automatic daily release for branch $BRANCH on $(date +%Y-%m-%d)"
          else
            echo "Skipping release creation for $BRANCH (no updates in scheduled run)"
            exit 0
          fi
          
          # Get the repository name from environment variable (format: owner/repo)
          REPO="$GITHUB_REPOSITORY"
          
          # Check if release already exists
          RELEASE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/releases/tags/${RELEASE_TAG}")
          
          if [ "$RELEASE_EXISTS" -eq 200 ]; then
            echo "Release $RELEASE_TAG already exists, skipping"
            exit 0
          fi
          
          # Check if tag already exists (check remote since we have shallow clone)
          TAG_EXISTS=false
          if git ls-remote --tags origin "$RELEASE_TAG" | grep -Fq "$RELEASE_TAG"; then
            TAG_EXISTS=true
            echo "Tag $RELEASE_TAG already exists on remote"
          else
            # Create tag
            # Tags only need the current commit, shallow clone is fine
            if ! git tag -a "$RELEASE_TAG" -m "$RELEASE_NOTES"; then
              echo "Error: Failed to create tag $RELEASE_TAG"
              exit 1
            fi
            
            # Push tag to remote and verify success
            if ! git push origin "$RELEASE_TAG"; then
              echo "Error: Failed to push tag $RELEASE_TAG to remote"
              # Clean up local tag if push failed
              git tag -d "$RELEASE_TAG" 2>/dev/null || true
              exit 1
            fi
            
            # Verify tag exists on remote before proceeding
            if ! git ls-remote --tags origin "$RELEASE_TAG" | grep -Fq "$RELEASE_TAG"; then
              echo "Error: Tag $RELEASE_TAG was pushed but not found on remote"
              exit 1
            fi
            
            echo "Successfully created and pushed tag $RELEASE_TAG"
            TAG_EXISTS=true
          fi
          
          # Create release in the fork repository using GitHub API
          # Properly escape JSON using Python (use printf to avoid trailing newline)
          ESCAPED_NOTES=$(printf '%s' "$RELEASE_NOTES" | python3 -c "import json, sys; print(json.dumps(sys.stdin.read()))")
          
          # Create release using GitHub API
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/releases" \
            -d "{
              \"tag_name\": \"${RELEASE_TAG}\",
              \"name\": \"${RELEASE_NAME}\",
              \"body\": ${ESCAPED_NOTES},
              \"target_commitish\": \"${BRANCH}\",
              \"draft\": false,
              \"prerelease\": false
            }")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" -eq 201 ]; then
            echo "Successfully created release $RELEASE_TAG for branch $BRANCH"
          elif [ "$HTTP_CODE" -eq 422 ]; then
            # Parse the error message from the response
            ERROR_MSG=$(echo "$BODY" | python3 -c "import json, sys; data=json.load(sys.stdin); print(data.get('message', 'Unknown error'))" 2>/dev/null || echo "Validation failed")
            echo "Failed to create release $RELEASE_TAG: $ERROR_MSG"
            echo "Full response: $BODY"
            # Don't exit with error if release already exists (might have been created between check and creation)
            if echo "$BODY" | grep -qi "already exists"; then
              echo "Release already exists, continuing..."
              exit 0
            else
              exit 1
            fi
          else
            echo "Failed to create release. HTTP code: $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi
